# device: "cuda"
device: "cuda:0"

model:
  segmentation: "facebook/sam3"
  depth_estimation: "Intel/dpt-hybrid-midas"

  # inpainting: "black-forest-labs/FLUX.1-Fill-dev"
  # controlnet_depth: "black-forest-labs/FLUX.1-Depth-dev"
  # controlnet_canny: "black-forest-labs/FLUX.1-Canny-dev"
  # controlnet_union: "InstantX/FLUX.1-dev-Controlnet-Union" 

  # inpainting: "stable-diffusion-v1-5/stable-diffusion-inpainting"
  # # controlnet: "lllyasviel/control_v11p_sd15_inpaint"
  # controlnet_depth: "lllyasviel/sd-controlnet-depth"
  # controlnet_canny: "lllyasviel/sd-controlnet-canny"
  # strength: 0.8 # for inpainting, how much to deviate from the original image, between 0 and 1

  inpainting: "diffusers/stable-diffusion-xl-1.0-inpainting-0.1"  
  vae: "madebyollin/sdxl-vae-fp16-fix"
  # controlnet_depth: "diffusers/controlnet-depth-sdxl-1.0"
  # controlnet_canny: "diffusers/controlnet-canny-sdxl-1.0"
  
  dap_config_path: "/mnt/common/hdd/home/SImany/StreetView-Synthetic-Change-Generator/DAP/config/infer.yaml"
  dap_load_weights_dir: "/mnt/common/hdd/home/SImany/StreetView-Synthetic-Change-Generator/DAP/weights"

input:
  project_path: "/mnt/common/hdd/home/SImany/StreetView-Synthetic-Change-Generator"
  # project_path: "/home/SImany/data_generation_pipeline"
  font_path: "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

  # resize_width: 1024
  resize_width: 1536
  resize_height: 640
  mask_index: -1 # which instance of the prompt_seg class to mask, -1 for random, -2 for largest
  mask_selection_mode: "single" # "single", "subset" , "biggest", "all"
  
  dilated_mask: true # whether to dilate the mask to include some context around the segmented object
  red_herring: False # whether to add red herrings, should be removed and randomly added in pipeline
  add_pothole: true

  canny: False
  depth: False
  inpaint: False # only for stable diffusion inpainting
  
  # "combinatorial" = test every prompt on every image
  # "pairwise" = pair image 1 with prompt 1, image 2 with prompt 2, etc.
  run_mode: "combinatorial"
  
  image_name: "panorama1.jpg"
  
  # image_folder: "clean_real_changes/"
  image_folder: "negative_prompts/"

  use_sam3 : True # whether to use SAM 3 for segmentation and correspondence, if false uses SAM 3.1
  image_names: 
   - "02_to_03_buildings_after.png"
   - "01_to_02_buildings_after.png"
   - "02_prev_1_to_03_center_buildings_after.png"
   - "02_to_03_buildings_after_1.png"

    # - "image_13.jpg"
    # - "5.jpg"
    # - "6.jpg"
    # # - "8.jpg"

    # - "panorama.jpg"
    # - "panorama8.jpg"
    # - "panorama1.jpg"
    # - "panorama2.jpg"
    # - "panorama3.jpg"
    # - "panorama7.jpg"
    # - "panorama9.jpg"

    # - "panorama5.jpg"
    # - "panorama3.jpg"
    # - "panorama4.jpg"
    
    # - "4.jpg"
    # - "2.jpg"
    # - "7.jpg"


  prompt_seg: "buildings" # cracks, buildings, traffic signs, roads, building under reconstruction
  prompts_seg:
    buildings: "(sky, trees) matching the surrounding context"
    traffic signs: ""
    cracks: ""
    # buildings under reconstruction: "completed building" 
    # trash cans: ""
    # traffic lights: ""
    # roads:
    #   - "urban road after heavy rain, large pothole filled with water, reflective puddle inside a damaged cavity, cracked and eroded asphalt edges, wet surface, realistic lighting, detailed texture photography"
    #   - "a deep pothole in an asphalt road filled with muddy rainwater, strong shadow gradient, reflective water with sky reflection, broken crumbling asphalt edges, realistic road damage, high resolution"
  

  red_herring_classes: 
    - "walls"
    - "building doors"
    - "building windows"
  

  prompts_inpaint: 
    # - "photorealistic street view, realistic urban scene, "
    # - remove and fill the region with plausible background continuation "
    # - "empty field"
    # - "The facade is dismantled. Scaffolding surrounds the building, protective safety netting installed."
    # - "building wrapped in scaffolding"
    # - "building under reconstruction"
    - "(sky, trees) matching the surrounding context"
    # - ""
    # - "sky"
    # - "background"
    # - "disappear"
    # - "a deep pothole in an asphalt road filled with muddy rainwater, strong shadow gradient, reflective water with sky reflection, broken crumbling asphalt edges, realistic road damage, high resolution"
    # - "urban road after heavy rain, large pothole filled with water, reflective puddle inside a damaged cavity, cracked and eroded asphalt edges, wet surface, realistic lighting, detailed texture photography"
    # - "same street, nighttime, low light, deep shadows"
    # - "same street, sunny day, clear sky, bright lighting"
    # - "same street, snow, overcast sky"
    # - "same street, spring, flowers blooming"
    # - "late night, very low light"
    # - "same street, foggy weather, low visibility, misty atmosphere"

    # - "same street, nighttime"
    # - "same street, heavy snow, overcast sky"
    # - "same street, autumn, fallen leaves on the ground"

  negative_prompts_inpaint:  # Flux doesnt get negative prompts
    # - "cartoon, painting, warped geometry, blurry"
    - "buildings"
    # - ""


augmentation:
  depth_estimation : "Intel/zoedepth-nyu-kitti"
  yaw_deg: 10.0
  translation_z: -5.0 # negative for forward movement, positive for backward movement
  prompt_inpaint: "street scene"
  refiner: false # true if you run one image augmentation
  class_name: "buildings" # for SAM 3 instance correspondence

output:
  # base: "/mnt/stores/store-DAI/pocs/simany/results_pipeline/"
  base: "/mnt/common/hdd/home/SImany/StreetView-Synthetic-Change-Generator/experiment_negative_prompts/"
  segmentation_overlay: "segmentation_overlay/"
  inpainting_results: "inpainting/"
  panorama_to_perspective: "panorama_to_perspective/"
  stitching_results: "stitching/"
  edge_detection_results: "edge_detection/"
  red_herring_results: "red_herring/"
  depth_results: "depth/"
  inpaited_only_results: "inpainted_only/"
  augmentation: "augmentation/"
  augmentation_masks: "augmentation_masks/"
  correspondence_visualization: "correspondence_visualization/"
  production_ready: "production_ready/"
  cubemap_tracking: "cubemap_tracking/"



hydra:
  job_logging:
    loggers:
      httpx:
        level: WARNING
